name: elixir
displayName: "Elixir"
description: "Elixir project with Mix, ExUnit, and Credo"
version: "1.0.0"
extends: ["_base"]
tags: ["elixir", "erlang", "otp"]
variables:
  language: "elixir"
  testRunner: "mix test"
  linter: "mix credo"
claudeMd:
  sections:
    - id: "elixir-rules"
      title: "Elixir Rules"
      content: |
        ## Elixir Development Rules

        - Follow Elixir naming conventions: modules PascalCase, functions/variables snake_case
        - Run `mix format` before every commit to enforce consistent formatting
        - Run `mix credo --strict` and fix all issues before pushing
        - Use pattern matching and guard clauses over conditional logic where possible
        - Prefer immutable data transformations with the pipe operator (|>)
        - Write typespecs (@spec) for all public functions
        - Use OTP behaviours (GenServer, Supervisor) for stateful and fault-tolerant processes
      priority: 20
    - id: "elixir-testing"
      title: "Elixir Testing"
      content: |
        ## Elixir Testing Rules

        - Use ExUnit for all tests; test files end with _test.exs
        - Every module MUST have a corresponding test file
        - Run `mix test` before every commit
        - Use ExUnit.Case async: true where tests are independent
      priority: 21
settings:
  permissions:
    allow:
      - "Bash(mix *)"
      - "Bash(mix credo*)"
      - "Bash(elixir *)"
      - "Bash(iex *)"
    deny:
      - "Bash(sudo *)"
      - "Bash(rm -rf *)"
